name: Lint

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint
        id: ktlint
        run: ./gradlew ktlintCheck

      - name: Publish Lint Report (PR)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 🧹 Lint Results
          path: '**/build/reports/ktlint/**/ktlint*.xml'
          reporter: java-junit
          fail-on-error: false
          comment-mode: always
